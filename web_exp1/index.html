<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tamil Nadu Districts – Wikipedia Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center; color:darkblue;">
    Tamil Nadu Districts – Wikipedia Viewer
</h1>

<div class="main">

    <div class="container1">
        <img src="chennai-map.jpg"
             alt="Tamil Nadu District Map"
             usemap="#image-map"
             class="image">

        <map name="image-map">

            <area class="chennai" coords="474,48,462,76" shape="rect">
            <area class="kanchipuram" coords="410,76,415,112,456,75" shape="poly">
            <area class="thiruvallur" coords="467,18,418,46,429,66,479,39,474,27" shape="poly">
            <area class="vellore" coords="322,79,323,102,354,92,361,63,304,63,290,90" shape="poly">
            <area class="tiruvannamalai" coords="372,109,315,121,301,167,355,174,402,140" shape="poly">
            <area class="salem" coords="187,194,250,202,308,241,270,226,204,245" shape="poly">
            <area class="madurai" coords="160,460,221,399,262,408,226,443" shape="poly">
            <area class="tirunelveli" coords="125,566,163,555,191,545,199,613,163,595" shape="poly">
            <area class="coimbatore" coords="97,379,118,329,106,264,81,276" shape="poly">

        </map>
    </div>

    <div class="container2">
        <iframe class="iframe1"></iframe>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
