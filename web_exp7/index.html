<!DOCTYPE html>
<html>
<head>
<title>Cookie Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#667eea;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4c5bd4;
}

</style>

</head>

<body>

<div class="container">

<h2>Login Page</h2>

<form action="CookieServlet" method="post">

<input type="text" name="username" placeholder="Enter your name" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
