<!DOCTYPE html>
<html>
<head>
<title>Add Book</title>

<style>
body{font-family:Arial;background:#f4f6f9;text-align:center;}
form{background:white;width:300px;margin:auto;padding:20px;border-radius:10px;}
input{margin:10px;padding:8px;width:90%;}
button{padding:10px;background:#4CAF50;color:white;border:none;}
</style>

</head>
<body>

<h2>Add Book</h2>

<form action="addbook" method="post">

<input type="text" name="title" placeholder="Title" required>
<input type="text" name="author" placeholder="Author" required>
<input type="number" name="price" placeholder="Price" required>

<button type="submit">Add</button>

</form>

</body>
</html>
